name: Refresh rent table

# Daily Zillow ZORI refresh. Listings refresh is manual via the
# desktop Refresh Redfin shortcut.

on:
  schedule:
    - cron: "0 11 * * *"   # daily at 7am ET (11:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh rent table
        run: python scripts/refresh_rent_table.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rent_psf_by_zip.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scheduled rent table refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
